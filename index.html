<!DOCTYPE html>
<html lang="en">
<head>
    <title>Customer App</title>
    <style>
        body { font-family: Arial;
            background-color:#f4f6f8;
            display: flex;
            justify-content: center;
            margin-top: 50px;
     }

     .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 0 10px rgda(0, 0, 0, 0.1);
     }

     h2 {
        text-align: center;
     }

     input {
        width: 70%;
        padding: 8px;
     }

     button {
        padding: 8px;
        margin-left: 5px;
        cursor: pointer;
     }

     li {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
     }

     .actions button {
        margin-left: 5px;
     }

     .empty{
        text-align: center;
        color: gray;
        margin-top: 10px;
     }
    </style>
</head>
<body>
    <div class="container">
        <h2>Customer Management</h2>

        <input type="text" id="nameInput" placeholder="Enter name">
        <button onclick="addCustomer()">Add</button>

        <ul id=""customerList></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
